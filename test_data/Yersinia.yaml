%YAML 1.2
---
metadata:
  filename: "Yersinia.yaml"
  id: "YP-01"
  type: "Y. pestis related variants"
  description: "Genetic pattern run config file for Yersinia pestis related variants"
  date_created: "2025-05-07"
  pointfinder_script_path: "/home/streevdm/Pacini-typing/config/PointFinder.py"

database:
  # name of the database prefix files
  name: "YP"
  # database path for genes-related database (blast/kma)
  path: "databases/YP"
  # database path for SNP-related database (pointfinder)
  path_snps: "databases/SNP/YP"
  # list of genes to build reference database from
  target_genes_file: "config/VIB-O1.fasta"
  # list of genes in which the SNPs of interest are placed in
  target_snps_file: "config/VIB-O1.fasta"
  # species of the SNP (used as prefix database name)
  species: "Yersinia"
  

global_settings:
  run_output: "output/"
  # SNP output only required if search mode is SNPs or both
  run_output_snps: "output/snp/"
  perc_ident: 99.8
  perc_cov: 100.0

pattern:
  - gene: "rfbV"
  - gene: "ctxA"
  - gene: "ctxB"
  - SNP: "rfbV_O1"
    ref: "ATG"
    alt: "L"
    pos: 1